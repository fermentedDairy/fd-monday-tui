name: CI

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '26'
        distribution: 'temurin'
        
    - name: Cache Gradle dependencies
      uses: actions/cache@v4
      with:
        path: ~/.gradle/caches
        key: gradle-${{ hashFiles('**/*.gradle.kts', '**/settings.gradle.kts') }}
        restore-keys: |
          gradle-
          
    - name: Build project
      run: ./gradlew clean build
      
    - name: Run tests
      run: ./gradlew test
      
    - name: Verify project
      run: ./gradlew verify
