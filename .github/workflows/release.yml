name: Release Build

on:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        
    - name: Cache Gradle dependencies
      uses: actions/cache@v4
      with:
        path: ~/.gradle/caches
        key: gradle-${{ hashFiles('**/*.gradle.kts', '**/settings.gradle.kts') }}
        restore-keys: |
          gradle-
          
    - name: Build with Gradle
      run: ./gradlew clean build -x test
      
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: fd_monday_tui-jar
        path: build/libs/fd_monday_tui-1.0-SNAPSHOT.jar
        